# Publishes to npm when a GitHub release is published (tag `vX.Y.Z`).
#
# Auth is OIDC "trusted publishing" — no npm token. The package is configured
# on npmjs.com (bool-sdk → Settings → Trusted Publisher) to trust this repo +
# this workflow file, and `id-token: write` below lets the runner mint the OIDC
# token npm verifies. Provenance is generated automatically on OIDC publishes.
#
# Requires npm >= 11.5.1 (installed below) — the Node bundled with setup-node
# ships an older npm that predates trusted publishing.
name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Upgrade npm for trusted publishing (OIDC)
        run: npm install -g npm@latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
      - run: bun run build
      - name: Check tag matches package version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "package.json version ($PKG_VERSION) != release tag ($TAG)" >&2
            exit 1
          fi
      # Route to a dist-tag derived from the version. A prerelease version
      # (`0.2.0-next.0`) publishes to that channel's tag (`next`) — invisible to
      # `latest` and to caret ranges, so no production app can pull it. A plain
      # version (`0.2.0`) publishes to `latest`. This is the whole two-channel
      # (stable / canary) mechanism; the GitHub release's "prerelease" checkbox
      # is cosmetic — the version string is the source of truth.
      - name: Publish (dist-tag from version)
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *-* ]]; then
            DIST_TAG="${VERSION#*-}"   # 0.2.0-next.0 -> next.0
            DIST_TAG="${DIST_TAG%%.*}" # next.0 -> next
          else
            DIST_TAG="latest"
          fi
          echo "Publishing $VERSION to dist-tag '$DIST_TAG'"
          npm publish --tag "$DIST_TAG"
