# Publishes to npm when a GitHub release is published (tag `vX.Y.Z`).
#
# Auth is OIDC "trusted publishing" — no npm token. The package is configured
# on npmjs.com (bool-sdk → Settings → Trusted Publisher) to trust this repo +
# this workflow file, and `id-token: write` below lets the runner mint the OIDC
# token npm verifies. Provenance is generated automatically on OIDC publishes.
#
# Requires npm >= 11.5.1 (installed below) — the Node bundled with setup-node
# ships an older npm that predates trusted publishing.
name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Upgrade npm for trusted publishing (OIDC)
        run: npm install -g npm@latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
      - run: bun run build
      - name: Check tag matches package version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "package.json version ($PKG_VERSION) != release tag ($TAG)" >&2
            exit 1
          fi
      - run: npm publish
